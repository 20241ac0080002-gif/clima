<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clima Radar Pro + Mapa</title>
    <!-- CSS do Mapa (Leaflet) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="estilo.css">
</head>
<body>

    <div class="container">
        <h1>Clima Radar Pro</h1>
        <p class="subtitle">Sua estação meteorológica inteligente</p>
        
        <div class="search-box">
            <input type="text" id="cidade-input" placeholder="Digite a cidade..." autocomplete="off">
            <button onclick="buscarClima()">Consultar Cidade</button>
            <button onclick="pegarLocalizacao()" class="btn-geo">📍 Usar Meu Local</button>
        </div>

        <div id="historico" class="historico-container"></div>

        <div id="resultado">
            <!-- Os dados aparecem aqui -->
        </div>

        <!-- DIV ONDE O MAPA SERÁ CRIADO -->
        <div id="mapa"></div>
    </div>

    <!-- Script do Mapa (Leaflet) -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
