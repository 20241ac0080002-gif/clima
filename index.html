<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clima Radar Pro</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>

    <div class="container">
        <h1>Clima Radar Pro</h1>
        <p class="subtitle">Sua estação meteorológica inteligente</p>
        
        <div class="search-box">
            <input type="text" id="cidade-input" placeholder="Digite a cidade..." autocomplete="off">
            <button onclick="buscarClima()">Consultar Cidade</button>
            <button onclick="pegarLocalizacao()" class="btn-geo">📍 Usar Meu Local</button>
        </div>

        <!-- Botões do Histórico -->
        <div id="historico" class="historico-container"></div>

        <div id="resultado">
            <!-- Os dados aparecem aqui -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
